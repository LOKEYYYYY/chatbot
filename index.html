<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nike AI Assistant</title>

  <!-- Dialogflow Messenger -->
  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

<style>
  df-messenger {
    --df-messenger-font-family: 'Inter', 'Segoe UI', sans-serif;

    /* Chat background */
    --df-messenger-chat-background: #f8fafc;

    /* Bot message */
    --df-messenger-bot-message: #111827;
    --df-messenger-font-color: #ffffff;

    /* User message */
    --df-messenger-user-message: #2563eb;

    /* Input */
    --df-messenger-input-box-color: #ffffff;
    --df-messenger-send-icon: #2563eb;

    /* Header */
    --df-messenger-button-titlebar-color: #000000;
    --df-messenger-button-titlebar-font-color: #ffffff;

    position: fixed;
    bottom: 20px;
    right: 20px;
  }

  /* Chat container */
  df-messenger-chat {
    border-radius: 20px !important;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    overflow: hidden;
  }

  /* Header bar */
  df-messenger-titlebar {
    background: #000 !important;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Messages */
  df-messenger-message {
    font-size: 14px;
    line-height: 1.6;
  }

  /* Bot bubble */
  df-messenger-message.bot {
    border-radius: 16px !important;
    padding: 12px 16px;
  }

  /* User bubble */
  df-messenger-message.user {
    border-radius: 16px !important;
    padding: 12px 16px;
  }

  /* Input area */
  df-messenger-input {
    border-top: 1px solid #e5e7eb;
    padding: 8px;
  }

  /* Input field */
  input {
    border-radius: 12px !important;
    padding: 10px !important;
  }
</style>

<!-- Chatbot -->
<df-messenger
  intent="WELCOME"
  chat-title="Nike AI Assistant"
  agent-id="063066d9-6e65-4e59-8180-ff4deb4a02bc"
  language-code="en"
></df-messenger>

</body>
</html>
