<!DOCTYPE html>
<html>
<head>
  <title>Nike AI Assistant</title>

  <style>
    body {
      margin: 0;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #f5f6f8;
    }

    /* Header */
    .header {
      background: black;
      color: white;
      padding: 18px 30px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    /* Layout */
    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    /* Left content (fake store) */
    .left {
      flex: 1;
      padding: 40px;
    }

    .left h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .left p {
      color: #555;
      font-size: 16px;
    }

    /* Chat container */
    .chat-wrapper {
      width: 380px;
      background: white;
      border-left: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
    }

    /* Chat header */
    .chat-header {
      padding: 15px;
      font-weight: bold;
      border-bottom: 1px solid #eee;
      background: #111;
      color: white;
    }

    /* Iframe */
    iframe {
      flex: 1;
      border: none;
    }
  </style>
</head>

<body>

  <div class="header">NIKE AI SHOPPING</div>

  <div class="container">

    <!-- LEFT SIDE (for realism) -->
    <div class="left">
      <h1>Find Your Perfect Fit</h1>
      <p>Use our AI assistant to discover products based on your needs.</p>

      <p><b>Try asking:</b></p>
      <ul>
        <li>black shoes under 200</li>
        <li>duffel bags</li>
        <li>cheap hoodies</li>
      </ul>
    </div>

    <!-- RIGHT SIDE CHAT -->
    <div class="chat-wrapper">
      <div class="chat-header">Nike Assistant</div>

      <iframe
        src="https://bot.dialogflow.com/063066d9-6e65-4e59-8180-ff4deb4a02bc">
      </iframe>
    </div>

  </div>

</body>
</html>
