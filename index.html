<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nike AI Assistant</title>

  <!-- Dialogflow Messenger -->
  <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>

  <!-- ENTERPRISE UI FIX -->
  <style>
    body {
      margin: 0;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #f3f4f6;
    }

    /* HEADER (optional but makes it look real) */
    .header {
      background: #000;
      color: white;
      padding: 16px 24px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* MAIN CHAT STYLING */
    df-messenger {
      /* GLOBAL */
      --df-messenger-font-family: 'Inter', sans-serif;
      --df-messenger-font-size: 14px;
      --df-messenger-font-color: #111;

      /* CHAT WINDOW */
      --df-messenger-chat-background: #f9fafb;
      --df-messenger-chat-padding: 16px;
      --df-messenger-chat-border-radius: 18px;

      /* 🔥 MOST IMPORTANT (FIX MESSY UI) */
      --df-messenger-message-spacing: 18px;
      --df-messenger-message-stack-spacing: 12px;

      /* BOT MESSAGE */
      --df-messenger-message-bot-background: #111827;
      --df-messenger-message-bot-font-color: #ffffff;
      --df-messenger-message-bot-border-radius: 16px;

      /* USER MESSAGE */
      --df-messenger-message-user-background: #2563eb;
      --df-messenger-message-user-font-color: #ffffff;
      --df-messenger-message-user-border-radius: 16px;

      /* TITLE BAR */
      --df-messenger-titlebar-background: #000;
      --df-messenger-titlebar-font-color: #fff;
      --df-messenger-titlebar-title-align: center;
      --df-messenger-titlebar-title-font-size: 16px;
      --df-messenger-titlebar-padding: 12px;

      /* INPUT */
      --df-messenger-input-background: #ffffff;
      --df-messenger-input-padding: 12px;
      --df-messenger-input-border-top: 1px solid #e5e7eb;

      /* SEND BUTTON */
      --df-messenger-send-icon-color: #2563eb;

      /* CHAT POSITION */
      position: fixed;
      bottom: 20px;
      right: 20px;
    }

    /* CHAT WINDOW SHADOW */
    df-messenger-chat {
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }

  </style>
</head>

<body>

  <!-- OPTIONAL HEADER -->
  <div class="header">NIKE AI SHOPPING ASSISTANT</div>

  <!-- CHATBOT -->
  <df-messenger
    intent="WELCOME"
    chat-title="Nike Assistant"
    agent-id="063066d9-6e65-4e59-8180-ff4deb4a02bc"
    language-code="en">
  </df-messenger>

  <!-- AUTO OPEN CHAT (for demo effect) -->
  <script>
    window.addEventListener('dfMessengerLoaded', function () {
      const messenger = document.querySelector('df-messenger');
      const shadowRoot = messenger.shadowRoot;

      setTimeout(() => {
        const button = shadowRoot.querySelector('df-messenger-chat-bubble');
        if (button) button.click();
      }, 1000);
    });
  </script>

</body>
</html>
